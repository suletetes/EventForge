AWSTemplateFormatVersion: '2010-09-09'
Description: EventForge S3 and CloudFront hosting for the React Dashboard

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name for resource naming

Resources:
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-eventforge-dashboard-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: EventForge

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: DashboardDistribution
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${DashboardBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${DashboardDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${EnvironmentName}-eventforge-dashboard-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${EnvironmentName} EventForge Dashboard'
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        HttpVersion: http2
        PriceClass: PriceClass_100
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: EventForge

Outputs:
  CloudFrontDistributionDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt DashboardDistribution.DomainName
    Export:
      Name: !Sub '${EnvironmentName}-EventForgeCloudFrontDomain'
  DashboardBucketName:
    Description: S3 bucket name for Dashboard static files
    Value: !Ref DashboardBucket
    Export:
      Name: !Sub '${EnvironmentName}-EventForgeDashboardBucket'
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref DashboardDistribution
    Export:
      Name: !Sub '${EnvironmentName}-EventForgeCloudFrontDistId'
