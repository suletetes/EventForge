name: Deploy EventForge

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: eventforge-api
  STACK_NAME: eventforge-dev
  ENVIRONMENT: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Bundle Lambda functions
        run: node scripts/bundle-lambdas.js

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: SAM package
        run: |
          sam package \
            --resolve-s3 \
            --s3-prefix $STACK_NAME \
            --region $AWS_REGION \
            --output-template-file packaged.yaml

      - name: SAM deploy
        run: |
          sam deploy \
            --template-file packaged.yaml \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              EnvironmentName=$ENVIRONMENT \
              ContainerImage=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Get stack outputs
        id: stack-outputs
        run: |
          echo "POOL_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "CLIENT_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "ALB_DNS=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='ALBDnsName'].OutputValue" --output text)" >> $GITHUB_OUTPUT

      - name: Build frontend with env vars
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.stack-outputs.outputs.POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.stack-outputs.outputs.CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ env.AWS_REGION }}
          VITE_API_BASE_URL: http://${{ steps.stack-outputs.outputs.ALB_DNS }}
        run: npm run build --prefix packages/frontend

      - name: Get AWS Account ID
        id: aws-account
        run: echo "ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        run: |
          aws s3 sync packages/frontend/dist/ \
            s3://${{ env.ENVIRONMENT }}-eventforge-dashboard-${{ steps.aws-account.outputs.ID }}/ \
            --delete --region ${{ env.AWS_REGION }}

      - name: Print dashboard URL
        run: |
          echo "Dashboard: http://${{ env.ENVIRONMENT }}-eventforge-dashboard-${{ steps.aws-account.outputs.ID }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo "API: http://${{ steps.stack-outputs.outputs.ALB_DNS }}/health"
